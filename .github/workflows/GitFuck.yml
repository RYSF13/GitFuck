name: GitFuck

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: GPG Key
        uses: crazy-max/ghaction-import-gpg@v5
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Track execution
        id: execution_data
        run: |
          if [ -f README.yml ]; then
            execution_count=$(grep -oP '(?<=Execution Count: )\d+' README.yml | tail -1)
            execution_count=$((execution_count + 1))
          else
            execution_count=1
          fi
          echo "execution_count=$execution_count" >> $GITHUB_ENV

      - name: Commit and Push Changes
        run: |
          git config user.name "RYSF13"
          git config user.email "1085908428@qq.com"
          current_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          count=0
          while [ $count -lt 1000 ]; do
            commit_id=$(cat /proc/sys/kernel/random/uuid)
            total_commits=$(git rev-list --count HEAD)

            echo "  _      _         " >> README.yml
            echo " / `._/_/_`   _  /_" >> README.yml
            echo "/_;/ / /  /_//_ /\ " >> README.yml       
            echo "----------------------------------------------------" >> README.yml
            echo "Commit ID: $commit_id" >> README.yml
            echo "Commit: $total_commits" >> README.yml
            echo "Execution Count: ${{ env.execution_count }}" >> README.yml
            echo "Last Execution Time: $current_time" >> README.yml
            echo "----------------------------------------------------" >> README.yml

            git add README.yml
            git commit -S -m "GitFuck (Total: $total_commits, Executions: ${{ env.execution_count }}, Last: $current_time)"
            count=$((count+1))
          done
          
          git push
        env:
          API_GITHUB_TOKEN: ${{ secrets.API_GITHUB_TOKEN }}
